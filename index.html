<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model Viewer AR Example</title>

    <!-- ���������� model-viewer -->
    <script type="module"
            src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial;
        }

        model-viewer {
            width: 80%;
            height: 70%;
            background: #222;
            border-radius: 12px;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

            button:hover {
                background: #45a049;
            }
    </style>
</head>
<body>

    <!-- 3D ������ -->
    <model-viewer id="viewer"
                  src="Models/Soldier5.glb"
                  ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
                  alt="Astronaut"
                  ar
                  ar-modes="scene-viewer quick-look webxr"
                  camera-controls
                  auto-rotate>
    </model-viewer>

    <!-- ������ AR -->
    <button onclick="enterAR()">������� AR</button>

    <script>
        function enterAR() {
        const viewer = document.getElementById('viewer');

        if (viewer.canActivateAR) {
        viewer.activateAR();
        } else {
        alert("AR �� �������������� �� ���� ����������");
        }
        }
    </script>

</body>
</html>
